services:
  redis:
    image: redis:7-alpine
    container_name: info-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:16379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  info-aggregation:
    image: info-ai-info-aggregation:pro
    build:
      context: ./info_aggregation
      dockerfile: Dockerfile
    container_name: info-aggregation
    restart: unless-stopped
    ports:
      - "127.0.0.1:18000:8000"
    environment:
      DATA_DIR: /app/data
      LOG_DIR: /app/data/logs
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DB_TYPE: ${DB_TYPE:-mysql}
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root1234}
      DB_NAME: ${DB_NAME:-info-max}
      AUTO_INIT_DB_SCHEMA: ${AUTO_INIT_DB_SCHEMA:-0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TZ: ${TZ:-Asia/Shanghai}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Shanghai}
      CRAWLER_MAX_CONTENT_LENGTH: ${CRAWLER_MAX_CONTENT_LENGTH:-12000}
      DETAIL_JOB_RUNNING_TIMEOUT_MINUTES: ${DETAIL_JOB_RUNNING_TIMEOUT_MINUTES:-30}
      ENABLE_PUBLIC_API: ${ENABLE_PUBLIC_API:-1}
      EVENT_ANALYSIS_MODE: ${EVENT_ANALYSIS_MODE:-hybrid}
      EVENT_ANALYSIS_ENABLE_LLM: ${EVENT_ANALYSIS_ENABLE_LLM:-0}
      EVENT_ANALYSIS_PROVIDER: ${EVENT_ANALYSIS_PROVIDER:-openai_compatible}
      EVENT_ANALYSIS_BASE_URL: ${EVENT_ANALYSIS_BASE_URL:-http://host.docker.internal:8001/v1}
      EVENT_ANALYSIS_API_KEY: ${EVENT_ANALYSIS_API_KEY:-}
      EVENT_ANALYSIS_MODEL: ${EVENT_ANALYSIS_MODEL:-qwen2.5-14b-instruct}
      EVENT_ANALYSIS_TIMEOUT: ${EVENT_ANALYSIS_TIMEOUT:-60}
      EVENT_ANALYSIS_MAX_INPUT_CHARS: ${EVENT_ANALYSIS_MAX_INPUT_CHARS:-12000}
      EVENT_ANALYSIS_TEMPERATURE: ${EVENT_ANALYSIS_TEMPERATURE:-0.2}
      EVENT_ANALYSIS_FALLBACK_TO_RULE: ${EVENT_ANALYSIS_FALLBACK_TO_RULE:-1}
      EVENT_ANALYSIS_LLM_RETRY_TIMES: ${EVENT_ANALYSIS_LLM_RETRY_TIMES:-2}
      EVENT_ANALYSIS_LLM_FAILURE_THRESHOLD: ${EVENT_ANALYSIS_LLM_FAILURE_THRESHOLD:-3}
      EVENT_ANALYSIS_LLM_COOLDOWN_MINUTES: ${EVENT_ANALYSIS_LLM_COOLDOWN_MINUTES:-30}
      ENABLE_SEED_DATA: ${ENABLE_SEED_DATA:-false}
      REBUILD_EVENTS_ON_STARTUP: ${REBUILD_EVENTS_ON_STARTUP:-false}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      ENABLE_REDIS_COMMAND_CONSUMER: ${ENABLE_REDIS_COMMAND_CONSUMER:-1}
      AGGREGATION_COMMAND_STREAM: ${AGGREGATION_COMMAND_STREAM:-info_ai:aggregation:commands}
      AGGREGATION_COMMAND_CONSUMER_GROUP: ${AGGREGATION_COMMAND_CONSUMER_GROUP:-info_aggregation}
      AGGREGATION_COMMAND_CONSUMER_NAME: ${AGGREGATION_COMMAND_CONSUMER_NAME:-}
      AGGREGATION_COMMAND_PENDING_IDLE_MS: ${AGGREGATION_COMMAND_PENDING_IDLE_MS:-60000}
      AGGREGATION_RESULT_PREFIX: ${AGGREGATION_RESULT_PREFIX:-info_ai:aggregation:results:}
      AGGREGATION_RESULT_TTL_SECONDS: ${AGGREGATION_RESULT_TTL_SECONDS:-86400}
    volumes:
      - aggregation_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  info-serve:
    image: info-ai-info-serve:pro
    build:
      context: ./info-serve
      dockerfile: Dockerfile
    container_name: info-serve
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      INFO_SERVE_HTTP_ADDR: :8085
      INFO_SERVE_MYSQL_DSN: ${INFO_SERVE_MYSQL_DSN:-root:root1234@tcp(host.docker.internal:3306)/info-max?charset=utf8mb4&parseTime=true&loc=Local}
      INFO_SERVE_SESSION_SECRET: ${INFO_SERVE_SESSION_SECRET:-change-me-in-production}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      AGGREGATION_COMMAND_STREAM: ${AGGREGATION_COMMAND_STREAM:-info_ai:aggregation:commands}
      AGGREGATION_RESULT_PREFIX: ${AGGREGATION_RESULT_PREFIX:-info_ai:aggregation:results:}
      AGGREGATION_RESULT_WAIT_MS: ${AGGREGATION_RESULT_WAIT_MS:-5000}
      AGGREGATION_HTTP_BASE_URL: ${AGGREGATION_HTTP_BASE_URL:-http://info-aggregation:8000}
      AGGREGATION_LLM_TIMEOUT_MS: ${AGGREGATION_LLM_TIMEOUT_MS:-240000}
      INFO_ADMIN_EMAIL: ${INFO_ADMIN_EMAIL:-admin@info-daren.local}
      INFO_ADMIN_PASSWORD: ${INFO_ADMIN_PASSWORD:-Admin123456}
      TZ: ${TZ:-Asia/Shanghai}
    depends_on:
      redis:
        condition: service_healthy
      info-aggregation:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  info-mvp:
    image: info-ai-info-mvp:pro
    build:
      context: ./info-mvp
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: info-mvp
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "8082:80"
    depends_on:
      - info-serve

  info-admin:
    image: info-ai-info-admin:pro
    build:
      context: ./info-admin
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: info-admin
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "8081:80"
    depends_on:
      - info-serve

volumes:
  redis_data:
  aggregation_data:
