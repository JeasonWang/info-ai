# info-mvp 部署配置
# 用法：docker compose -f docker-compose.mvp.yml up -d --build info-mvp
# 该文件仅包含 info-mvp 服务，复用现有 info-serve 后端

services:
  info-mvp:
    image: info-ai-info-mvp:pro
    build:
      context: ./info-mvp
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_INFO_SERVE_BASE_URL:-http://127.0.0.1:8080}/api
    container_name: info-mvp
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - info-serve
