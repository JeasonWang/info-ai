name: Deploy

on:
  push:
    branches: [main, master, feature/*]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images
        run: |
          docker-compose build

      - name: Export images
        run: |
          mkdir -p images
          docker save info-ai_info-aggregation info-ai_info-serve info-ai_info-max info-ai_info-admin | gzip > images/info-ai-images.tar.gz

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "images/info-ai-images.tar.gz,docker-compose.yml,deploy.sh,info_aggregation/sql/mysql_schema_pro.sql"
          target: ${{ secrets.SERVER_DEPLOY_PATH || '/opt/info-ai' }}

      - name: Restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ secrets.SERVER_DEPLOY_PATH || '/opt/info-ai' }}
            docker load < images/info-ai-images.tar.gz
            docker-compose up -d
            docker-compose ps
            docker system prune -f
