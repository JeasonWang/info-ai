name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      VITE_INFO_SERVE_BASE_URL: ${{ vars.VITE_INFO_SERVE_BASE_URL || secrets.VITE_INFO_SERVE_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate deployment config
        run: |
          if [ -z "${VITE_INFO_SERVE_BASE_URL}" ]; then
            echo "请在 GitHub repository variable 或 secret 中配置 VITE_INFO_SERVE_BASE_URL，例如 https://api.example.com"
            exit 1
          fi

      - name: Build images
        run: |
          docker compose -f docker-compose.yml build

      - name: Export images
        run: |
          mkdir -p images
          docker save \
            info-ai-info-aggregation:pro \
            info-ai-info-serve:pro \
            info-ai-info-max:pro \
            info-ai-info-admin:pro \
            | gzip > images/info-ai-images.tar.gz

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "images/info-ai-images.tar.gz,docker-compose.yml,deploy.sh,info_aggregation/sql/mysql_schema_pro.sql"
          target: ${{ secrets.SERVER_DEPLOY_PATH || '/opt/info-ai' }}

      - name: Restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ secrets.SERVER_DEPLOY_PATH || '/opt/info-ai' }}
            ./deploy.sh prod image-tar
            docker ps --filter "name=info-" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            docker system prune -f
